<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" role="img" aria-labelledby="title desc">
  <title id="title">Case D After Sequence</title>
  <desc id="desc">Redis-backed handoff sequence after separating AI orchestration from core work.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="12" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#58a6ff"></path>
    </marker>
    <style>
      .bg { fill: #0d1117; }
      .title { font: 700 32px 'Inter', 'Segoe UI', sans-serif; fill: #f0f6fc; letter-spacing: 0.04em; }
      .subtitle { font: 500 18px 'Inter', 'Segoe UI', sans-serif; fill: #8b949e; }
      .tag { font: 700 14px 'Inter', 'Segoe UI', sans-serif; fill: #58a6ff; letter-spacing: 0.18em; }
      .step { fill: #161b22; stroke: #58a6ff; stroke-width: 2.5; rx: 22; }
      .step-accent { fill: #161b22; stroke: #f0883e; stroke-width: 2.5; rx: 22; }
      .step-title { font: 700 22px 'Inter', 'Segoe UI', sans-serif; fill: #f0f6fc; }
      .step-text { font: 500 16px 'Inter', 'Segoe UI', sans-serif; fill: #c9d1d9; }
      .arrow { stroke: #58a6ff; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .arrow-accent { stroke: #f0883e; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .arrow-flow { stroke: #58a6ff; stroke-width: 3; stroke-dasharray: 8 8; fill: none; marker-end: url(#arrow); }
      .note { font: 600 18px 'Inter', 'Segoe UI', sans-serif; fill: #7ee787; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="660"></rect>
  <text x="60" y="72" class="tag">AFTER · REDIS-BACKED HANDOFF</text>
  <text x="60" y="116" class="title">FastAPI reads state, calls LLM and hands off the result</text>

  <!-- Row 1 -->
  <rect x="50" y="155" width="320" height="125" class="step"></rect>
  <text x="210" y="195" text-anchor="middle" class="step-title">1. Browser</text>
  <text x="210" y="230" text-anchor="middle" class="step-text">Submit failed TODO</text>
  <text x="210" y="260" text-anchor="middle" class="step-text">Open AI service</text>

  <rect x="430" y="155" width="320" height="125" class="step"></rect>
  <text x="590" y="195" text-anchor="middle" class="step-title">2. FastAPI AI</text>
  <text x="590" y="230" text-anchor="middle" class="step-text">Load latest session</text>
  <text x="590" y="260" text-anchor="middle" class="step-text">Check quota / history</text>

  <rect x="810" y="155" width="320" height="125" class="step"></rect>
  <text x="970" y="195" text-anchor="middle" class="step-title">3. Redis</text>
  <text x="970" y="230" text-anchor="middle" class="step-text">Session / Latest</text>
  <text x="970" y="260" text-anchor="middle" class="step-text">Quota / History</text>

  <!-- Row 2 -->
  <rect x="50" y="335" width="320" height="125" class="step"></rect>
  <text x="210" y="375" text-anchor="middle" class="step-title">4. LLM API</text>
  <text x="210" y="410" text-anchor="middle" class="step-text">Generate plan</text>
  <text x="210" y="435" text-anchor="middle" class="step-text">No core blocking</text>

  <rect x="430" y="335" width="320" height="125" class="step-accent"></rect>
  <text x="590" y="375" text-anchor="middle" class="step-title">5. Spring Task API</text>
  <text x="590" y="410" text-anchor="middle" class="step-text">Store selected plan</text>
  <text x="590" y="435" text-anchor="middle" class="step-text">Create task entity</text>

  <rect x="810" y="335" width="320" height="125" class="step"></rect>
  <text x="970" y="375" text-anchor="middle" class="step-title">6. Core Work</text>
  <text x="970" y="410" text-anchor="middle" class="step-text">continues on</text>
  <text x="970" y="435" text-anchor="middle" class="step-text">its own path</text>

  <!-- Arrows -->
  <path class="arrow" d="M 372 217.5 L 428 217.5"></path>
  <path class="arrow" d="M 752 217.5 L 808 217.5"></path>
  
  <!-- Flow Connector -->
  <path class="arrow-flow" d="M 970 282 C 970 310, 210 305, 210 333"></path>

  <path class="arrow-accent" d="M 372 397.5 L 428 397.5"></path>
  <path class="arrow" d="M 752 397.5 L 808 397.5"></path>

  <text x="60" y="596" class="note">AI latency stays in the AI lane, while the core service continues on its own path.</text>
</svg>
