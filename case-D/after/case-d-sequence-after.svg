<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" role="img" aria-labelledby="title desc">
  <title id="title">Case D After Sequence</title>
  <desc id="desc">Redis-backed handoff sequence after separating AI orchestration from core work.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="12" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#58a6ff"></path>
    </marker>
    <style>
      .bg { fill: #0d1117; }
      .title { font: 700 32px 'Inter', 'Segoe UI', sans-serif; fill: #f0f6fc; letter-spacing: 0.04em; }
      .subtitle { font: 500 18px 'Inter', 'Segoe UI', sans-serif; fill: #8b949e; }
      .tag { font: 700 14px 'Inter', 'Segoe UI', sans-serif; fill: #58a6ff; letter-spacing: 0.18em; }
      .step { fill: #161b22; stroke: #58a6ff; stroke-width: 2.5; rx: 22; }
      .step-accent { fill: #161b22; stroke: #f0883e; stroke-width: 2.5; rx: 22; }
      .step-title { font: 700 21px 'Inter', 'Segoe UI', sans-serif; fill: #f0f6fc; }
      .step-text { font: 500 16px 'Inter', 'Segoe UI', sans-serif; fill: #c9d1d9; }
      .arrow { stroke: #58a6ff; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .arrow-accent { stroke: #f0883e; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .arrow-flow { stroke: #58a6ff; stroke-width: 3; stroke-dasharray: 8 8; fill: none; marker-end: url(#arrow); }
      .note { font: 600 18px 'Inter', 'Segoe UI', sans-serif; fill: #7ee787; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="660"></rect>
  <text x="60" y="72" class="tag">AFTER · REDIS-BACKED HANDOFF</text>
  <text x="60" y="116" class="title">FastAPI reads state, calls LLM and hands off the result</text>
  <text x="60" y="152" class="subtitle">흐름: 브라우저 요청이 FastAPI → Redis → LLM → Spring Task 순서로 분리되어 이어집니다.</text>

  <!-- Row 1 -->
  <rect x="50" y="180" width="320" height="125" class="step"></rect>
  <text x="210" y="209" text-anchor="middle" class="step-title">1. Browser</text>
  <text x="210" y="242" text-anchor="middle" class="step-text">실패한 TODO 제출</text>
  <text x="210" y="270" text-anchor="middle" class="step-text">AI 서비스 호출</text>

  <rect x="430" y="180" width="320" height="125" class="step"></rect>
  <text x="590" y="209" text-anchor="middle" class="step-title">2. FastAPI AI</text>
  <text x="590" y="242" text-anchor="middle" class="step-text">최신 세션 로드</text>
  <text x="590" y="270" text-anchor="middle" class="step-text">Quota / 이력 확인</text>

  <rect x="810" y="180" width="320" height="125" class="step"></rect>
  <text x="970" y="209" text-anchor="middle" class="step-title">3. Redis</text>
  <text x="970" y="242" text-anchor="middle" class="step-text">session / latest</text>
  <text x="970" y="270" text-anchor="middle" class="step-text">quota / history</text>

  <!-- Row 2 -->
  <rect x="50" y="360" width="320" height="125" class="step"></rect>
  <text x="210" y="389" text-anchor="middle" class="step-title">4. LLM API</text>
  <text x="210" y="422" text-anchor="middle" class="step-text">계획 생성</text>
  <text x="210" y="450" text-anchor="middle" class="step-text">코어 블로킹 없음</text>

  <rect x="430" y="360" width="320" height="125" class="step-accent"></rect>
  <text x="590" y="389" text-anchor="middle" class="step-title">5. Spring Task API</text>
  <text x="590" y="422" text-anchor="middle" class="step-text">선택한 계획 저장</text>
  <text x="590" y="450" text-anchor="middle" class="step-text">Task 엔티티 생성</text>

  <rect x="810" y="360" width="320" height="125" class="step"></rect>
  <text x="970" y="389" text-anchor="middle" class="step-title">6. Core Work</text>
  <text x="970" y="422" text-anchor="middle" class="step-text">별도 경로로 진행</text>
  <text x="970" y="450" text-anchor="middle" class="step-text">코어 작업 계속</text>

  <!-- Arrows -->
  <path class="arrow" d="M 372 242.5 L 428 242.5"></path>
  <path class="arrow" d="M 752 242.5 L 808 242.5"></path>
  
  <!-- Flow Connector -->
  <path class="arrow-flow" d="M 970 305 C 970 350, 320 350, 210 360"></path>

  <path class="arrow-accent" d="M 372 422.5 L 428 422.5"></path>
  <path class="arrow" d="M 752 422.5 L 808 422.5"></path>

  <text x="60" y="596" class="note">AI 작업은 AI 경계 안에서 끝내고, 코어 작업은 별도 경로로 이어집니다.</text>
</svg>
